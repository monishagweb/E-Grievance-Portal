<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Register — E-Grievance Portal</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="container">
    <div class="card" style="max-width:700px;margin:auto">
      <h2>Create Student Account</h2>
      <form method="POST" action="/register">
        <div class="form-grid">
          <div>
            <div class="form-row">
              <label for="name">Full name</label>
              <input id="name" name="name" type="text" placeholder="Your name" required>
            </div>
            <div class="form-row">
              <label for="roll">Roll Number</label>
              <input id="roll" name="roll" type="text" placeholder="eg: CS2201" required>
            </div>
            <div class="form-row">
              <label for="email">Email</label>
              <input id="email" name="email" type="email" placeholder="your.email@college.edu" required>
            </div>
          </div>
          <div>
            <div class="form-row">
              <label for="dept">Department</label>
              <input id="dept" name="department" type="text" placeholder="CSE, ECE..." required>
            </div>
            <div class="form-row">
              <label for="password">Password</label>
              <input id="password" name="password" type="password" required>
            </div>
            <div class="form-row">
              <label for="confirm">Confirm Password</label>
              <input id="confirm" name="confirm_password" type="password" required>
            </div>
          </div>
        </div>

        <div style="margin-top:12px">
          <button class="btn" type="submit">Register</button>
          <a href="index.html" class="btn secondary" style="margin-left:8px">Back to Login</a>
        </div>
      </form>
    </div>
  </div>
</body>
</html>
